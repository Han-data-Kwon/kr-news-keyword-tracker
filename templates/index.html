<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>국내 뉴스 & 기업 정보 키워드 검색기</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #4285f4; --danger: #e53935; --success: #43a047;
      --bg: #f0f2f5; --card: #ffffff; --border: #e0e0e0;
      --text: #212121; --sub: #757575;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Apple SD Gothic Neo', Arial, sans-serif; background: var(--bg); color: var(--text); padding: 24px; }
    h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }

    .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab-button { padding: 8px 20px; background: #ddd; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 14px; transition: all .2s; }
    .tab-button.active { background: var(--primary); color: #fff; }
    .section { display: none; }
    .section.active { display: block; }

    .search-bar { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .search-bar input { flex: 1; min-width: 200px; padding: 10px 14px; font-size: 14px; border: 1px solid var(--border); border-radius: 8px; outline: none; }
    .search-bar input:focus { border-color: var(--primary); }

    .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-outline { background: #fff; border: 1px solid var(--border); color: var(--text); }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-sm      { padding: 4px 10px; font-size: 12px; border-radius: 6px; }

    .input-hint { font-size: 12px; color: var(--sub); margin-bottom: 16px; }

    .tab-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .fav-tag { display: flex; align-items: center; gap: 6px; padding: 5px 12px; background: #e8f0fe; border-radius: 16px; cursor: pointer; font-size: 13px; }
    .fav-tag:hover { background: #d2e3fc; }
    .fav-tag .close { background: none; border: none; color: #e53935; font-weight: 700; cursor: pointer; font-size: 13px; }

    .card { background: var(--card); border-radius: 10px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .card h3 { font-size: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f5f5f5; padding: 8px 10px; text-align: left; border-bottom: 2px solid var(--border); font-weight: 600; }
    td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr.highlight td { background: #fffde7; }
    tr:hover td { background: #fafafa; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; }
    .badge-pos   { background: #e8f5e9; color: #2e7d32; }
    .badge-neg   { background: #ffebee; color: #c62828; }
    .badge-neu   { background: #f5f5f5; color: #616161; }
    .badge-kospi  { background: #e8f5e9; color: #2e7d32; }
    .badge-kosdaq { background: #fff8e1; color: #f57f17; }
    .badge-etc    { background: #f5f5f5; color: #616161; }

    .trend-container { background: var(--card); border-radius: 10px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .trend-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .trend-header h4 { font-size: 14px; }
    canvas { width: 100% !important; height: 180px !important; max-height: 200px; }

    .company-result-area { display: none; }
    .company-result-area.show { display: block; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; justify-content: center; align-items: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: #fff; border-radius: 12px; padding: 24px; width: 90%; max-width: 640px; max-height: 80vh; overflow-y: auto; position: relative; }
    .modal h3 { font-size: 17px; margin-bottom: 16px; }
    .modal .close-modal { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--sub); }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; margin-bottom: 16px; }
    .info-item label { font-size: 11px; color: var(--sub); display: block; margin-bottom: 2px; }
    .info-item span { font-size: 13px; font-weight: 600; }
    .finance-table th { font-size: 12px; }
    .finance-table td { font-size: 12px; }

    .loading { display: none; text-align: center; padding: 20px; color: var(--sub); font-size: 13px; }
    .loading.show { display: block; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid #e0e0e0; border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-msg { text-align: center; color: var(--sub); padding: 24px; font-size: 13px; }

    @media (max-width: 768px) {
      body { padding: 12px; }
      .info-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<h2>📋 국내 뉴스 & 기업 정보 키워드 검색기</h2>

<div class="tabs">
  <button class="tab-button active" onclick="switchTab('news-section', this)">📰 뉴스 검색</button>
  <button class="tab-button" onclick="switchTab('company-section', this)">🏢 기업 정보 검색</button>
</div>

<!-- 뉴스 검색 탭 -->
<div id="news-section" class="section active">
  <div class="tab-bar" id="favorite-tabs"></div>
  <div class="search-bar">
    <input type="text" id="keyword" placeholder="예: 복지, B2B, 트럼프" onkeydown="if(event.key==='Enter') searchNews()" />
    <button class="btn btn-primary" onclick="searchNews()">검색</button>
  </div>
  <div id="news-container"></div>
  <div id="trend-charts"></div>
</div>

<!-- 기업 정보 검색 탭 -->
<div id="company-section" class="section">
  <div class="search-bar">
    <input type="text" id="companyKeyword" placeholder="기업명 검색 (예: 삼성전자, 카카오, 여기어때)" onkeydown="if(event.key==='Enter') searchCompany()" />
    <button class="btn btn-primary" onclick="searchCompany()">검색</button>
    <button class="btn btn-outline" onclick="downloadCompanyCSV()">⬇ CSV</button>
  </div>
  <p class="input-hint">💡 <strong>DART</strong>(금융감독원) 기반 기업 검색 · 상장사 및 비상장 법인 포함</p>

  <div id="company-loading" class="loading"><span class="spinner"></span>조회 중...</div>

  <div id="company-result-area" class="company-result-area">
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>회사명</th>
            <th>시장</th>
            <th>종목코드</th>
            <th>상세</th>
          </tr>
        </thead>
        <tbody id="dart-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- DART 상세 모달 -->
<div class="modal-overlay" id="dart-modal">
  <div class="modal">
    <button class="close-modal" onclick="closeModal()">✕</button>
    <h3 id="modal-corp-name">기업 상세정보</h3>
    <div class="info-grid" id="modal-info-grid"></div>
    <hr style="margin:16px 0; border:none; border-top:1px solid #eee;">
    <h4 style="font-size:14px; margin-bottom:10px;">재무정보 <span id="modal-finance-year" style="font-size:12px; color:#888;"></span></h4>
    <div id="modal-finance-loading" class="loading show"><span class="spinner"></span>재무정보 로딩 중...</div>
    <table class="finance-table" id="modal-finance-table" style="display:none;">
      <thead><tr><th>항목</th><th>당기</th><th>전기</th></tr></thead>
      <tbody id="modal-finance-tbody"></tbody>
    </table>
    <p id="modal-finance-empty" style="display:none; font-size:13px; color:#888; padding:12px 0;">재무정보를 불러올 수 없습니다.</p>
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   공통
═══════════════════════════════════════ */
function switchTab(id, button) {
  document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  button.classList.add('active');
  localStorage.setItem("currentTab", id);
}

function formatNumber(v) {
  if (v === "-" || v == null || v === "") return "-";
  const n = Number(String(v).replace(/,/g, ""));
  if (isNaN(n)) return v;
  return n.toLocaleString();
}

function formatWon(v) {
  if (v === "-" || v == null || v === "") return "-";
  const n = Number(String(v).replace(/,/g, ""));
  if (isNaN(n)) return v;
  if (Math.abs(n) >= 1e12) return (n / 1e12).toFixed(1) + "조원";
  if (Math.abs(n) >= 1e8)  return (n / 1e8).toFixed(0)  + "억원";
  return n.toLocaleString() + "원";
}

function formatPubDate(dateStr) {
  if (!dateStr) return "-";
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr.substring(0, 16);
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  const hh = String(d.getHours()).padStart(2, "0");
  const mi = String(d.getMinutes()).padStart(2, "0");
  return `${d.getFullYear()}-${mm}-${dd} ${hh}:${mi}`;
}

window.onload = () => {
  const savedTab = localStorage.getItem("currentTab") || "news-section";
  const btn = document.querySelector(`.tab-button[onclick*="${savedTab}"]`);
  if (btn) switchTab(savedTab, btn);
  getSortedTopKeywords().forEach(k => { searchNews(k, false); renderTrendChart(k); });
  renderTabs();
};

setInterval(() => getSortedTopKeywords().forEach(k => refreshNews(k)), 10 * 60 * 1000);

/* ═══════════════════════════════════════
   뉴스 검색
═══════════════════════════════════════ */
const positiveWords = ["급등","호재","성장","기대","회복","반등","돌파","상승","강세","개선","확대","유망","안정","기록","신기록","최고","인하","완화","도입","승인"];
const negativeWords = ["하락","폭락","급락","추락","붕괴","우려","불안","침체","위기","적자","악재","둔화","패배","실패","감소","하회","경고","연기","위협","타격"];

function analyzeSentiment(text) {
  const pos = positiveWords.some(w => text.includes(w));
  const neg = negativeWords.some(w => text.includes(w));
  return pos && !neg ? "pos" : neg && !pos ? "neg" : "neu";
}

let tableCount = 0;
const maxTables = 15;
const savedKeywordsKey = "savedKeywords";
const keywordFreqKey   = "keywordFreq";
const lastHashes = {}, lastLinks = {};

function searchNews(keyword = "", save = true) {
  if (!keyword) keyword = document.getElementById("keyword").value.trim();
  if (!keyword) return alert("키워드를 입력해주세요.");
  if (tableCount >= maxTables) return alert("최대 15개까지 표시됩니다.");

  fetch(`/api/search_news?q=${encodeURIComponent(keyword)}`)
    .then(r => r.ok ? r.json() : Promise.reject(r))
    .then(data => {
      if (!data.length) return alert("뉴스 결과가 없습니다.");
      const hash = data.map(d => d.link).join(",");
      const prevLinks = lastLinks[keyword] || [];
      if (hash !== lastHashes[keyword] && lastHashes[keyword] &&
          document.getElementById('news-section').classList.contains('active'))
        alert(`"${keyword}"의 새 뉴스가 업데이트되었습니다.`);
      lastHashes[keyword] = hash;
      lastLinks[keyword]  = data.map(d => d.link);

      const old = document.getElementById("table-" + keyword);
      if (old) { old.remove(); tableCount--; }
      tableCount++;

      const div = document.createElement("div");
      div.className = "card"; div.id = "table-" + keyword;

      let rows = "";
      data.forEach(item => {
        const s  = analyzeSentiment(item.title);
        const bc = s === "pos" ? "badge-pos" : s === "neg" ? "badge-neg" : "badge-neu";
        const bl = s === "pos" ? "▲ 긍정"    : s === "neg" ? "▼ 부정"    : "● 중립";
        const hl = !prevLinks.includes(item.link) ? "highlight" : "";
        const src = (item.source || "").replace(/https?:\/\/(www\.)?/, "").split("/")[0];
        rows += `<tr class="${hl}">
          <td><a href="${item.link}" target="_blank">${item.title}</a></td>
          <td style="white-space:nowrap;">${src}</td>
          <td style="white-space:nowrap;">${formatPubDate(item.date)}</td>
          <td><span class="badge ${bc}">${bl}</span></td>
        </tr>`;
      });

      div.innerHTML = `<h3>${keyword} 관련 뉴스
        <button class="btn btn-danger btn-sm" onclick="removeTableOnly('${div.id}')">삭제</button></h3>
        <table><thead><tr><th>제목</th><th>출처</th><th>날짜</th><th>감성</th></tr></thead>
        <tbody>${rows}</tbody></table>`;
      document.getElementById("news-container").prepend(div);

      if (save) {
        const kws = JSON.parse(localStorage.getItem(savedKeywordsKey) || "[]");
        const fqs = JSON.parse(localStorage.getItem(keywordFreqKey) || "{}");
        fqs[keyword] = (fqs[keyword] || 0) + 1;
        localStorage.setItem(keywordFreqKey, JSON.stringify(fqs));
        if (!kws.includes(keyword)) {
          kws.push(keyword);
          localStorage.setItem(savedKeywordsKey, JSON.stringify(kws));
        }
        renderTabs();
        renderTrendChart(keyword);
      }
    })
    .catch(err => alert(err.status === 403 || err.status === 429 ? "검색량 제한 도달" : "뉴스 검색 실패"));
}

function refreshNews(keyword) {
  fetch(`/api/search_news?q=${encodeURIComponent(keyword)}`).then(r => r.json()).then(data => {
    if (!data.length) return;
    const hash = data.map(d => d.link).join(",");
    if (hash !== lastHashes[keyword] && document.getElementById('news-section').classList.contains('active'))
      alert(`"${keyword}"의 새 뉴스가 감지되었습니다.`);
    lastHashes[keyword] = hash;
    lastLinks[keyword]  = data.map(d => d.link);
    const div = document.getElementById("table-" + keyword);
    if (div) { div.remove(); tableCount--; }
    searchNews(keyword, false);
  });
}

function removeTableOnly(id) {
  const el = document.getElementById(id);
  if (el) { el.remove(); tableCount--; }
}

function removeKeywordCompletely(keyword) {
  removeTableOnly("table-" + keyword);
  document.getElementById("trend-" + keyword)?.remove();
  const kws = JSON.parse(localStorage.getItem(savedKeywordsKey) || "[]").filter(k => k !== keyword);
  localStorage.setItem(savedKeywordsKey, JSON.stringify(kws));
  const fqs = JSON.parse(localStorage.getItem(keywordFreqKey) || "{}");
  delete fqs[keyword];
  localStorage.setItem(keywordFreqKey, JSON.stringify(fqs));
  renderTabs();
}

function renderTabs() {
  const container = document.getElementById("favorite-tabs");
  container.innerHTML = "";
  getSortedTopKeywords().forEach(k => {
    const tag = document.createElement("div");
    tag.className = "fav-tag";
    tag.innerHTML = `<span onclick="searchNews('${k}',false);renderTrendChart('${k}')">${k}</span>
      <button class="close" onclick="event.stopPropagation();removeKeywordCompletely('${k}')">×</button>`;
    container.appendChild(tag);
  });
}

function getSortedTopKeywords() {
  const kws = JSON.parse(localStorage.getItem(savedKeywordsKey) || "[]");
  const fqs = JSON.parse(localStorage.getItem(keywordFreqKey) || "{}");
  return kws.sort((a, b) => (fqs[b] || 0) - (fqs[a] || 0)).slice(0, 5);
}

function renderTrendChart(keyword, period = "30d") {
  fetch(`/api/trend?q=${encodeURIComponent(keyword)}&period=${period}`).then(r => r.json()).then(data => {
    if (!data || data.error) return;
    let container = document.getElementById("trend-" + keyword), canvas;
    if (container) {
      container.querySelector("h4").innerText = `${keyword} 검색 트렌드 (${period === "1y" ? "1년" : "30일"})`;
      canvas = container.querySelector("canvas");
      const nc = canvas.cloneNode(true);
      canvas.parentNode.replaceChild(nc, canvas);
      canvas = nc;
    } else {
      container = document.createElement("div");
      container.className = "trend-container";
      container.id = "trend-" + keyword;
      container.innerHTML = `<div class="trend-header">
        <h4>${keyword} 검색 트렌드 (${period === "1y" ? "1년" : "30일"})</h4>
        <div>
          <button class="btn btn-outline btn-sm" onclick="renderTrendChart('${keyword}','30d')">30일</button>
          <button class="btn btn-outline btn-sm" onclick="renderTrendChart('${keyword}','1y')">1년</button>
        </div></div>`;
      canvas = document.createElement("canvas");
      canvas.id = "chart-" + keyword;
      container.appendChild(canvas);
      document.getElementById("trend-charts").appendChild(container);
    }
    new Chart(canvas.getContext("2d"), {
      type: "line",
      data: {
        labels: data.map(d => d.date),
        datasets: [{
          label: keyword,
          data: data.map(d => d.ratio),
          borderColor: "rgba(66,133,244,1)",
          backgroundColor: "rgba(66,133,244,0.08)",
          fill: true, tension: 0.3, pointRadius: 2
        }]
      },
      options: {
        scales: { x: { ticks: { maxTicksLimit: 6 } }, y: { beginAtZero: true } },
        plugins: { legend: { display: false } },
        interaction: { mode: 'index', intersect: false },
        responsive: true, maintainAspectRatio: false
      }
    });
  });
}

/* ═══════════════════════════════════════
   기업 정보 검색 (DART)
═══════════════════════════════════════ */
function searchCompany() {
  const keyword = document.getElementById("companyKeyword").value.trim();
  if (!keyword) return alert("기업명을 입력해주세요.");

  const loading = document.getElementById("company-loading");
  const area    = document.getElementById("company-result-area");
  loading.classList.add("show");
  area.classList.remove("show");

  fetch(`/api/company/search?q=${encodeURIComponent(keyword)}`)
    .then(r => r.json())
    .then(data => {
      loading.classList.remove("show");
      area.classList.add("show");
      renderDartTable(data.dart || []);
    })
    .catch(() => {
      loading.classList.remove("show");
      alert("서버 오류가 발생했습니다.");
    });
}

function renderDartTable(list) {
  const tbody = document.getElementById("dart-tbody");
  tbody.innerHTML = "";
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="4" class="empty-msg">검색 결과가 없습니다.</td></tr>`;
    return;
  }
  list.forEach(c => {
    const cls = c.stock_code && c.stock_code !== "-" ? "KOSPI/KOSDAQ" : "비상장";
    const bc  = cls === "비상장" ? "badge-etc" : "badge-kospi";
    const row = document.createElement("tr");
    row.innerHTML = `
      <td><strong>${c.corp_name}</strong></td>
      <td><span class="badge ${bc}">${cls}</span></td>
      <td>${c.stock_code || "-"}</td>
      <td><button class="btn btn-outline btn-sm"
        onclick="openDartDetail('${c.corp_code}','${c.corp_name.replace(/'/g, "\\'")}')">상세</button></td>`;
    tbody.appendChild(row);
  });
}

function openDartDetail(corp_code, corp_name) {
  document.getElementById("modal-corp-name").innerText = corp_name;
  document.getElementById("modal-info-grid").innerHTML = "";
  document.getElementById("modal-finance-tbody").innerHTML = "";
  document.getElementById("modal-finance-loading").classList.add("show");
  document.getElementById("modal-finance-table").style.display = "none";
  document.getElementById("modal-finance-empty").style.display = "none";
  document.getElementById("dart-modal").classList.add("show");

  fetch(`/api/company/dart/detail?corp_code=${corp_code}`)
    .then(r => r.json())
    .then(data => {
      const infoFields = [
        ["대표자",    data.ceo_nm      || "-"],
        ["임직원수",  data.emp_count != null ? Number(data.emp_count).toLocaleString() + "명" : "-"],
        ["시장구분",  data.corp_cls    || "-"],
        ["종목코드",  data.stock_code  || "-"],
        ["업종코드",  data.induty_code || "-"],
        ["설립일",    data.est_dt      || "-"],
        ["결산월",    data.acc_mt      ? data.acc_mt + "월" : "-"],
        ["대표전화",  data.phn_no      || "-"],
        ["홈페이지",  data.hm_url && data.hm_url !== "-"
          ? `<a href="${data.hm_url}" target="_blank">${data.hm_url}</a>` : "-"],
        ["주소",      data.adres       || "-"],
        ["사업자번호", data.bizr_no    || "-"],
      ];

      document.getElementById("modal-info-grid").innerHTML =
        infoFields.map(([label, val]) =>
          `<div class="info-item"><label>${label}</label><span>${val}</span></div>`
        ).join("");

      document.getElementById("modal-finance-loading").classList.remove("show");
      document.getElementById("modal-finance-year").innerText =
        data.finance_year ? `(${data.finance_year}년 기준)` : "";

      if (data.finance && data.finance.length) {
        document.getElementById("modal-finance-tbody").innerHTML =
          data.finance.map(f =>
            `<tr><td>${f["항목"]}</td><td>${formatWon(f["당기"])}</td><td>${formatWon(f["전기"])}</td></tr>`
          ).join("");
        document.getElementById("modal-finance-table").style.display = "table";
      } else {
        document.getElementById("modal-finance-empty").style.display = "block";
      }
    })
    .catch(() => {
      document.getElementById("modal-finance-loading").classList.remove("show");
      document.getElementById("modal-finance-empty").style.display = "block";
    });
}

function closeModal() {
  document.getElementById("dart-modal").classList.remove("show");
}
document.getElementById("dart-modal").addEventListener("click", e => {
  if (e.target === document.getElementById("dart-modal")) closeModal();
});

function downloadCompanyCSV() {
  const rows = [...document.querySelectorAll("#dart-tbody tr")].map(r =>
    [...r.querySelectorAll("td")].slice(0, 3)
      .map(td => `"${td.innerText.replace(/"/g, '""')}"`).join(",")
  ).filter(Boolean);

  if (!rows.length) return alert("다운로드할 데이터가 없습니다.");

  const csv = "회사명,시장,종목코드\n" + rows.join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `기업정보_${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
</script>
</body>
</html>
